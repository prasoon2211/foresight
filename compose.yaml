x-postgres-environment: &postgres-environment
  POSTGRES_DB: ${POSTGRES_DB:-foresight}
  POSTGRES_USER: ${POSTGRES_USER:-foresight}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-foresight}

x-app-environment: &app-environment
  <<: *postgres-environment
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-development-only-secret-key}
  DJANGO_SECRET_KEY_FALLBACKS: ${DJANGO_SECRET_KEY_FALLBACKS:-}
  ENCRYPTION_SALT_KEYS: ${ENCRYPTION_SALT_KEYS:-development-only-encryption-salt}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
  ACCOUNT_CONFIRM_EMAIL_URL: ${ACCOUNT_CONFIRM_EMAIL_URL:-http://localhost:5173/verify-email/{key}}
  DJANGO_EMAIL_BACKEND: ${DJANGO_EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
  DJANGO_EMAIL_HOST: ${DJANGO_EMAIL_HOST:-localhost}
  DJANGO_EMAIL_PORT: ${DJANGO_EMAIL_PORT:-25}
  DJANGO_EMAIL_HOST_USER: ${DJANGO_EMAIL_HOST_USER:-}
  DJANGO_EMAIL_HOST_PASSWORD: ${DJANGO_EMAIL_HOST_PASSWORD:-}
  DJANGO_EMAIL_USE_TLS: ${DJANGO_EMAIL_USE_TLS:-false}
  DJANGO_DEFAULT_FROM_EMAIL: ${DJANGO_DEFAULT_FROM_EMAIL:-foresight@localhost}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8000}
  GITHUB_APP_ID: ${GITHUB_APP_ID:-}
  GITHUB_APP_PRIVATE_KEY: ${GITHUB_APP_PRIVATE_KEY:-}
  GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
  GITHUB_API_URL: ${GITHUB_API_URL:-https://api.github.com}
  POSTGRES_HOST: ${POSTGRES_HOST:-db}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}

x-app-service: &app-service
  build:
    context: .
  environment: *app-environment
  depends_on:
    migrate:
      condition: service_completed_successfully

services:
  db:
    image: postgres:18-alpine
    environment: *postgres-environment
    command: postgres -p ${POSTGRES_PORT:-5432}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -p ${POSTGRES_PORT:-5432}",
        ]
      interval: 2s
      timeout: 3s
      retries: 15
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:${POSTGRES_PORT:-5432}"
    volumes:
      - postgres-data:/var/lib/postgresql

  migrate:
    build:
      context: .
    environment: *app-environment
    command: python manage.py migrate --noinput
    depends_on:
      db:
        condition: service_healthy

  web:
    <<: *app-service
    command: uvicorn foresight.asgi:application --host 0.0.0.0 --port 8000
    ports:
      - "${WEB_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 12

  worker:
    <<: *app-service
    command: python manage.py procrastinate worker
    healthcheck:
      test: ["CMD", "python", "manage.py", "procrastinate", "healthchecks"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  postgres-data:
